<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shake Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#00e5ff;--accent-dim:#00e5ff33;--warn:#ff6b35;--text:#e0e0e8;--muted:#6b6b80}
html,body{height:100%;touch-action:none}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100dvh;overflow-y:auto;overflow-x:hidden}
.container{width:100%;max-width:420px;padding:10px 14px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.header{text-align:center}
.header h1{font-size:20px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.visualizer{width:100%;height:140px;border-radius:14px;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden}
.visualizer canvas{width:100%;height:100%}
.pendulum-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;background:var(--bg);padding:2px 8px;border-radius:100px;border:1px solid var(--border)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center}
.stat-value{font-size:16px;font-weight:700;color:var(--accent);line-height:1}
.stat-value.warn{color:var(--warn)}
.stat-label{font-size:7px;color:var(--muted);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.debug-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:9px;color:var(--muted);text-align:center}
.timeline{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px}
.timeline-header{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.timeline-track{height:30px;background:var(--bg);border-radius:5px;position:relative;overflow:hidden}
.timeline-clip{position:absolute;border-radius:2px;opacity:0.9}
.timeline-clip.snd1{background:var(--accent);top:1px;height:calc(50% - 2px)}
.timeline-clip.snd2{background:var(--warn);top:50%;height:calc(50% - 1px)}
.timeline-clip.active{opacity:1;box-shadow:0 0 8px currentColor}
.axis-row{display:flex;gap:4px}
.axis-btn{flex:1;padding:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:6px;font-family:inherit;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.axis-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn-test{padding:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:8px;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-test:active{transform:scale(0.95);opacity:0.8}
.btn-start{width:100%;padding:12px;border:2px solid var(--accent);background:var(--accent-dim);color:var(--accent);border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-start:active{transform:scale(0.97)}
.btn-start.active{background:var(--accent);color:var(--bg)}
.status{text-align:center;font-size:10px;color:var(--muted);min-height:14px;padding-bottom:10px}
.hit-flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 0.15s}
.hit-flash.s1{background:radial-gradient(circle at 50% 50%,#00e5ff20,transparent 70%)}
.hit-flash.s2{background:radial-gradient(circle at 50% 50%,#ff6b3520,transparent 70%)}
.hit-flash.on{opacity:1}
</style>
</head>
<body>
<div class="hit-flash s1" id="flash1"></div>
<div class="hit-flash s2" id="flash2"></div>
<div class="container">
<div class="header"><h1>SHAKE PLAYER</h1></div>
<div class="visualizer">
<canvas id="vizCanvas"></canvas>
<div class="pendulum-label" id="pendulumLabel">--</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-value" id="statPhase">--</div><div class="stat-label">Phase ms</div></div>
<div class="stat"><div class="stat-value" id="statSpeed">--</div><div class="stat-label">Speed</div></div>
<div class="stat"><div class="stat-value" id="statHits">0</div><div class="stat-label">Hits</div></div>
</div>
<div class="debug-bar" id="debugBar">accel: --</div>
<div class="timeline">
<div class="timeline-header">Timeline</div>
<div class="timeline-track" id="timelineTrack"></div>
</div>

<div class="controls">
<button class="btn-test s1" id="btnTest1">&#9654; Sound 1</button>
<button class="btn-test s2" id="btnTest2">&#9654; Sound 2</button>
</div>
<button class="btn-start" id="btnStart">Start</button>
<div class="status" id="status"></div>
</div>

var bg=ctx2d.createRadialGradient(bx,by,0,bx,by,gs);bg.addColorStop(0,mc);bg.addColorStop(0.4,mc+'80');bg.addColorStop(1,mc+'00');
ctx2d.fillStyle=bg;ctx2d.beginPath();ctx2d.arc(bx,by,gs,0,Math.PI*2);ctx2d.fill();
ctx2d.beginPath();ctx2d.arc(bx,by,6,0,Math.PI*2);ctx2d.fillStyle=mc;ctx2d.fill();
ctx2d.beginPath();ctx2d.arc(cx,py,3,0,Math.PI*2);ctx2d.fillStyle='#3a3a50';ctx2d.fill();
requestAnimationFrame(drawViz);
}

async function start(){
var btn=document.getElementById('btnStart'),st=document.getElementById('status');
if(isRunning){isRunning=false;btn.textContent='START';btn.classList.remove('active');st.textContent='';if(pendingSound){clearTimeout(pendingSound);pendingSound=null}return}
st.textContent='Zavantazhennia...';
try{if(!audioCtx)await initAudio();if(audioCtx.state==='suspended')await audioCtx.resume()}catch(e){st.textContent='Error: '+e.message;return}
if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){try{var p=await DeviceMotionEvent.requestPermission();if(p!=='granted'){st.textContent='Motion denied';return}}catch(e){st.textContent='Perm error';return}}
isRunning=true;hitCount=0;halfPhaseCount=0;lastDirection=0;detectedAxis=null;
phaseStartTime=performance.now();timelineClips=[];currentPhaseDuration=NORMAL_PHASE_MS;
gravityInited=false;calSamples=0;calSumX=0;calSumY=0;calSumZ=0;
btn.textContent='STOP';btn.classList.add('active');
st.textContent=hasCleanAccel?'Khytai!':'Kalibruvannia...';
if(!hasCleanAccel)setTimeout(function(){if(isRunning)st.textContent='Khytai!'},1500);
updateStats();
}

document.getElementById('btnStart').addEventListener('click',start);
document.getElementById('btnTest1').addEventListener('click',function(){if(!audioCtx)initAudio().then(function(){playSound1()});else playSound1()});
document.getElementById('btnTest2').addEventListener('click',function(){if(!audioCtx)initAudio().then(function(){playSound2()});else playSound2()});
window.addEventListener('devicemotion',handleMotion,true);
window.addEventListener('keydown',function(e){
if(!isRunning)return;if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight')return;
var dir=e.key==='ArrowRight'?1:-1;targetAngle=dir*0.7;setTimeout(function(){targetAngle=0},200);
var now=performance.now();
if(lastDirection!==0&&dir!==lastDirection){var hd=now-phaseStartTime;if(hd>60){halfPhaseCount++;if(halfPhaseCount%2===1){currentPhaseDuration=Math.max(MIN_PHASE_MS,Math.min(MAX_PHASE_MS,hd*2));playSound1();scheduleSound2(computeDelay(currentPhaseDuration));hitCount++;updateStats()}phaseStartTime=now}}
lastDirection=dir;
});
window.addEventListener('resize',resizeCanvas);resizeCanvas();drawViz();
</script>
